name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - frontend/**
      - .github/workflows/deploy-frontend-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Validate frontend env
        run: |
          if [ -z "${VITE_API_BASE_URL}" ]; then
            echo "VITE_API_BASE_URL is empty. Set repository variable or secret VITE_API_BASE_URL before deploying."
            exit 1
          fi
          if [[ "${VITE_API_BASE_URL}" != https://* ]]; then
            echo "Warning: VITE_API_BASE_URL is not HTTPS. Browsers may block mixed content from a HTTPS GitHub Pages site."
          fi

      - name: Build frontend
        run: npm run build

      - name: Add SPA fallback for deep links
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
